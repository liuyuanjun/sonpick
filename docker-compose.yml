# 本地开发可选。生产请用 deploy/ + scripts/deploy-nas.sh
services:
  sonpick:
    build:
      context: .
      dockerfile: Dockerfile
    image: sonpick:local
    container_name: sonpick
    restart: unless-stopped
    ports:
      - "8301:8000"
    env_file:
      - path: .env
        required: false
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      STORAGE_PATH: /app/downloads
      DATABASE_PATH: /app/data/music.db
      DATA_DIR: /app/data
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      # - ./downloads:/app/downloads
      - /vol2/@team/Music:/app/downloads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
